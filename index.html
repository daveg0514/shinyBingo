<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiny Slots</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #07090d;
  --surface:   #0d1420;
  --surface2:  #121c2c;
  --border:    #1e2e44;
  --text:      #dde8f4;
  --muted:     #4a6080;
  --gold:      #f4c94e;
  --gold-hi:   #ffe980;
  --gold-lo:   #7a5f10;
  --green:     #2ecc71;
  --red:       #e74c3c;
  --amber:     #f39c12;
  --dave:      #4fc3f7;
  --colton:    #ff8a65;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  padding: 30px 20px 60px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Starfield */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(1px 1px at  8% 12%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 55%, rgba(255,255,255,.20) 0%, transparent 100%),
    radial-gradient(1px 1px at 38%  8%, rgba(255,255,255,.30) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 72%, rgba(255,255,255,.20) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 30%, rgba(255,255,255,.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 88%, rgba(255,255,255,.20) 0%, transparent 100%),
    radial-gradient(1px 1px at 12% 90%, rgba(255,255,255,.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,.20) 0%, transparent 100%),
    radial-gradient(2px 2px at 94% 18%, rgba(244,201,78,.50) 0%, transparent 100%),
    radial-gradient(2px 2px at  3% 60%, rgba(244,201,78,.40) 0%, transparent 100%),
    radial-gradient(2px 2px at 50% 95%, rgba(79,195,247,.30) 0%, transparent 100%);
  z-index: 0;
}

.container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 44px;
}

.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px;
  letter-spacing: 8px;
  line-height: 1;
  background: linear-gradient(180deg, #fff8c0 0%, var(--gold) 35%, #c8860a 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 24px rgba(244,201,78,.55));
}

.header-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 6px;
}

.sync-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  background: var(--surface);
  padding: 4px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── MACHINE OUTER WRAP (animated border) ── */
.machine-wrap {
  position: relative;
  margin-bottom: 44px;
  border-radius: 22px;
}

.machine-wrap::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  background: linear-gradient(60deg,
    var(--gold), #ff6b6b, #a855f7, var(--dave), var(--gold));
  background-size: 300% 300%;
  animation: borderFlow 5s ease infinite;
  z-index: 0;
}

@keyframes borderFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── MACHINE BODY ── */
.slot-machine {
  position: relative;
  z-index: 1;
  background: linear-gradient(160deg, #131f30 0%, #0d1728 60%, #080e18 100%);
  border-radius: 20px;
  padding: 32px 32px 28px;
  box-shadow:
    0 24px 80px rgba(0,0,0,.85),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.nameplate {
  text-align: center;
  margin-bottom: 26px;
}

.nameplate-inner {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 7px;
  color: var(--gold-lo);
  background: var(--surface2);
  padding: 5px 24px;
  border-radius: 4px;
  border: 1px solid var(--gold-lo);
}

/* ── REELS TRAY ── */
.slots {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  background: #04080e;
  border-radius: 12px;
  padding: 14px;
  border: 2px solid #0e1e30;
  box-shadow: inset 0 4px 24px rgba(0,0,0,.9);
  margin-bottom: 26px;
}

.slot {
  background: linear-gradient(180deg, #0b1420 0%, #060c14 100%);
  border: 2px solid #182840;
  border-radius: 8px;
  padding: 18px 14px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 2px 10px rgba(0,0,0,.7);
}

/* Scanlines */
.slot::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px
  );
  pointer-events: none;
  border-radius: 6px;
  z-index: 2;
}

/* Centre highlight bar */
.slot::before {
  content: '';
  position: absolute;
  inset: 0;
  top: 50%; transform: translateY(-50%);
  height: 72px;
  background: rgba(244,201,78,.04);
  border-top: 1px solid rgba(244,201,78,.18);
  border-bottom: 1px solid rgba(244,201,78,.18);
  pointer-events: none;
  z-index: 1;
}

.slot-label {
  font-size: 9px;
  color: var(--gold-lo);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 12px;
  font-family: 'DM Mono', monospace;
  position: relative;
  z-index: 3;
}

.slot-value {
  font-size: 18px;
  font-weight: 600;
  color: var(--gold);
  min-height: 68px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  position: relative;
  z-index: 3;
  line-height: 1.3;
  text-align: center;
  transition: color .3s;
}

.slot-value.spinning {
  animation: reelBlur .08s linear infinite;
  filter: blur(2px);
  color: rgba(244,201,78,.45);
}

.slot-value.landing {
  animation: reelLand .45s cubic-bezier(.22,1,.36,1) both;
}

@keyframes reelBlur {
  0%   { transform: translateY(-4px); }
  50%  { transform: translateY(4px); }
  100% { transform: translateY(-4px); }
}

@keyframes reelLand {
  0%   { transform: translateY(-10px) scale(1.06); filter: blur(2px); color: rgba(244,201,78,.5); }
  55%  { transform: translateY(4px) scale(.97); filter: blur(0); }
  75%  { transform: translateY(-2px) scale(1.02); }
  100% { transform: translateY(0) scale(1); color: var(--gold-hi); filter: drop-shadow(0 0 10px rgba(244,201,78,.9)); }
}

.respin-btn {
  margin-top: 10px;
  width: 100%;
  padding: 5px 8px;
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid #1e3048;
  background: rgba(244,201,78,.04);
  color: var(--gold-lo);
  transition: all .2s;
  position: relative;
  z-index: 3;
}

.respin-btn:hover {
  border-color: var(--gold-lo);
  color: var(--gold);
  background: rgba(244,201,78,.1);
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 14px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

.player-select {
  display: flex;
  gap: 6px;
  background: var(--surface2);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.player-btn {
  padding: 10px 22px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  background: transparent;
  color: var(--muted);
  transition: all .2s;
  font-weight: 600;
  letter-spacing: .5px;
}

.player-btn.dave:hover        { color: var(--dave); border-color: rgba(79,195,247,.3); }
.player-btn.colton:hover      { color: var(--colton); border-color: rgba(255,138,101,.3); }
.player-btn.dave.active       { background: rgba(79,195,247,.14); color: var(--dave); border-color: var(--dave); }
.player-btn.colton.active     { background: rgba(255,138,101,.14); color: var(--colton); border-color: var(--colton); }

/* 3-D casino SPIN button */
.spin-btn {
  padding: 14px 52px;
  font-size: 22px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 4px;
  border-radius: 10px;
  cursor: pointer;
  border: none;
  background: linear-gradient(180deg, #fff5a0 0%, var(--gold) 50%, #c08000 100%);
  color: #1a1000;
  font-weight: 400;
  position: relative;
  top: 0;
  box-shadow:
    0 5px 0 #6a4400,
    0 8px 20px rgba(244,201,78,.4);
  text-shadow: 0 1px 0 rgba(255,255,255,.35);
  transition: top .1s, box-shadow .1s, background .15s;
}

.spin-btn:hover:not(:disabled) {
  background: linear-gradient(180deg, #fffbe0 0%, #ffe880 50%, var(--gold) 100%);
  box-shadow: 0 5px 0 #6a4400, 0 10px 28px rgba(244,201,78,.55);
  top: -2px;
}

.spin-btn:active:not(:disabled) {
  top: 5px;
  box-shadow: 0 0 0 #6a4400, 0 2px 6px rgba(244,201,78,.3);
}

.spin-btn:disabled { opacity: .35; cursor: not-allowed; top: 0; box-shadow: none; }

.add-btn {
  padding: 12px 26px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid var(--green);
  background: rgba(46,204,113,.08);
  color: var(--green);
  transition: all .2s;
  font-weight: 600;
  letter-spacing: .5px;
}

.add-btn:hover:not(:disabled) {
  background: var(--green);
  color: #001a08;
  box-shadow: 0 4px 22px rgba(46,204,113,.45);
}

.add-btn:disabled { opacity: .25; cursor: not-allowed; }

/* ── HUNT PANELS ── */
.tables {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}

.table-container {
  background: linear-gradient(160deg, #0e1828 0%, #090f1a 100%);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
}

.table-header {
  padding: 15px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.table-header.dave   { background: linear-gradient(90deg, rgba(79,195,247,.12) 0%, transparent 80%); border-left: 3px solid var(--dave); }
.table-header.colton { background: linear-gradient(90deg, rgba(255,138,101,.12) 0%, transparent 80%); border-left: 3px solid var(--colton); }

.table-header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
}

.table-header.dave   .table-header-title { color: var(--dave); }
.table-header.colton .table-header-title { color: var(--colton); }

.table-header-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  background: var(--surface2);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.hunt-list {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 480px;
  overflow-y: auto;
}

.hunt-list::-webkit-scrollbar { width: 4px; }
.hunt-list::-webkit-scrollbar-track { background: transparent; }
.hunt-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── HUNT CARD ── */
.hunt-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto auto;
  gap: 8px;
  align-items: center;
  position: relative;
  overflow: hidden;
  transition: border-color .25s, background .25s;
}

/* Left status rail */
.hunt-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--border);
  transition: background .3s;
}

.hunt-card.status-active  { border-color: rgba(243,156,18,.35); background: rgba(243,156,18,.05); }
.hunt-card.status-active::before  { background: var(--amber); }

.hunt-card.status-caught  { border-color: rgba(46,204,113,.25); background: rgba(46,204,113,.04); }
.hunt-card.status-caught::before  { background: var(--green); box-shadow: 0 0 6px rgba(46,204,113,.6); }

.hunt-cell {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.hunt-card.status-caught .hunt-cell {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: rgba(46,204,113,.4);
}

/* Status badge */
.status-badge {
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid;
  white-space: nowrap;
  transition: all .2s;
  user-select: none;
  letter-spacing: .5px;
  text-transform: uppercase;
}

.status-badge.pending {
  color: var(--muted);
  border-color: var(--border);
  background: transparent;
}
.status-badge.pending:hover { color: var(--amber); border-color: var(--amber); background: rgba(243,156,18,.07); }

.status-badge.active {
  color: var(--amber);
  border-color: var(--amber);
  background: rgba(243,156,18,.1);
  animation: badgePulse 1.8s ease-in-out infinite;
}

.status-badge.caught {
  color: var(--green);
  border-color: var(--green);
  background: rgba(46,204,113,.1);
  box-shadow: 0 0 8px rgba(46,204,113,.35);
}

@keyframes badgePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 rgba(243,156,18,0); }
  50%       { opacity: .75; box-shadow: 0 0 10px rgba(243,156,18,.5); }
}

.delete-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  padding: 3px 5px;
  border-radius: 4px;
  transition: all .2s;
  line-height: 1;
}

.delete-btn:hover { color: var(--red); background: rgba(231,76,60,.1); }

.empty-state {
  padding: 44px 20px;
  text-align: center;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── RESPONSIVE ── */
@media (max-width: 820px) {
  .slots  { grid-template-columns: 1fr; }
  .tables { grid-template-columns: 1fr; }
  .header-title { font-size: 46px; }
  .hunt-card { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 6px; }
  .hunt-card .hunt-cell:nth-child(3) { grid-column: span 2; }
}
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">★ Shiny Slots ★</div>
    <div class="header-sub">The Premier Pokémon Hunt Casino</div>
    <div><span class="sync-pill" id="syncStatus">⟳ Connecting...</span></div>
  </div>

  <!-- SLOT MACHINE -->
  <div class="machine-wrap">
    <div class="slot-machine">
      <div class="nameplate"><span class="nameplate-inner">✦ &nbsp; Reel Machine &nbsp; ✦</span></div>

      <div class="slots">
        <div class="slot">
          <div class="slot-label">Game</div>
          <div class="slot-value" id="game">– – –</div>
          <button class="respin-btn" onclick="respinGame()">⟳ Respin</button>
        </div>
        <div class="slot">
          <div class="slot-label">Method</div>
          <div class="slot-value" id="method">– – –</div>
          <button class="respin-btn" onclick="respinMethod()">⟳ Respin</button>
        </div>
        <div class="slot">
          <div class="slot-label">Pokémon</div>
          <div class="slot-value" id="pokemon">– – –</div>
          <button class="respin-btn" onclick="respinPokemon()">⟳ Respin</button>
        </div>
      </div>

      <div class="controls">
        <div class="player-select">
          <button class="player-btn dave active" onclick="selectPlayer('dave')">Dave</button>
          <button class="player-btn colton" onclick="selectPlayer('colton')">Colton</button>
        </div>
        <button class="spin-btn" onclick="spin()" id="spinBtn">SPIN</button>
        <button class="add-btn" onclick="addToList()" id="addBtn" disabled>+ Add Hunt</button>
      </div>
    </div>
  </div>

  <!-- HUNT TABLES -->
  <div class="tables">
    <div class="table-container">
      <div class="table-header dave">
        <span class="table-header-title">Dave's Hunts</span>
        <span class="table-header-count" id="daveCount">0 hunts</span>
      </div>
      <div class="hunt-list" id="daveTable">
        <div class="empty-state">No hunts yet</div>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header colton">
        <span class="table-header-title">Colton's Hunts</span>
        <span class="table-header-count" id="coltonCount">0 hunts</span>
      </div>
      <div class="hunt-list" id="coltonTable">
        <div class="empty-state">No hunts yet</div>
      </div>
    </div>
  </div>

</div>

function getPokemonForGen(gen) {
  let out = [];
  for (let i = 1; i <= gen; i++) out = out.concat(pokemonByGen[i]);
  return out;
}

function getPokemonForMethod(game, method) {
  const d = GAME_DATA[game];
  if (method === 'Soft Reset (Starters)'   && d.starters)         return d.starters;
  if (method === 'Soft Reset (Legendaries)' && d.legendaries)      return d.legendaries;
  if (method === 'Ultra Wormhole'           && d.ultraWormhole)    return d.ultraWormhole;
  if (method === 'Dynamax Adventure'        && d.dynamaxAdventure) return d.dynamaxAdventure;
  return getPokemonForGen(d.gen);
}

// ── JSONBIN SYNC ──
const MASTER_KEY = '$2a$10$y78gUbDpbg0cgnCLtYOgO.YI6kWqvi1Z0F45uFkoC2cpPACtN.G7y';
const binId      = '69ed383a856a6821897180c7';
let autoRefreshInterval = null;

function setSyncStatus(s, msg) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = { ok: 'var(--green)', err: 'var(--red)', loading: 'var(--gold)', idle: 'var(--muted)' }[s] || 'var(--muted)';
}

async function pushState(data) {
  setSyncStatus('loading', '⟳ Saving...');
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b/' + binId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
      body: JSON.stringify(data)
    });
    if (!res.ok) { setSyncStatus('err', '✗ Save failed'); return false; }
    setSyncStatus('ok', '✓ Saved ' + new Date().toLocaleTimeString());
    return true;
  } catch (e) { setSyncStatus('err', '✗ Save failed'); return false; }
}

async function pullState() {
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    if (!res.ok) return null;
    const d = await res.json();
    return d.record || null;
  } catch (e) { return null; }
}

function defaultState() { return { dave: [], colton: [] }; }

function isValidState(s) {
  return s && Array.isArray(s.dave) && Array.isArray(s.colton);
}

function startAutoRefresh() {
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(async () => {
    if (document.hidden || isSaving) return;
    const serverState = await pullState();
    if (!isValidState(serverState) || isSaving) return;
    state = serverState;
    localStorage.setItem('shinyHunts', JSON.stringify(state));
    renderTables();
    setSyncStatus('ok', '✓ Synced ' + new Date().toLocaleTimeString());
  }, 5000);
}

// ── STATE ──
let selectedPlayer = 'dave';
let currentResult  = null;
let state          = defaultState();
let currentGame    = null;
let currentMethod  = null;
let isSaving       = false;

async function loadAndRender() {
  setSyncStatus('loading', '⟳ Loading...');
  const serverState = await pullState();
  if (isValidState(serverState)) {
    state = serverState;
  } else {
    try {
      const saved  = localStorage.getItem('shinyHunts');
      const parsed = saved ? JSON.parse(saved) : null;
      state = isValidState(parsed) ? parsed : defaultState();
    } catch (e) { state = defaultState(); }
  }
  localStorage.setItem('shinyHunts', JSON.stringify(state));
  setSyncStatus('ok', '✓ Loaded ' + new Date().toLocaleTimeString());
  renderTables();
  startAutoRefresh();
}

async function saveState() {
  isSaving = true;
  localStorage.setItem('shinyHunts', JSON.stringify(state));
  await pushState(state);
  isSaving = false;
}

function selectPlayer(player) {
  selectedPlayer = player;
  document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.player-btn.' + player).classList.add('active');
}

function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── SPIN ──
function landReel(el, value) {
  el.classList.remove('spinning');
  el.textContent = value;
  el.classList.add('landing');
  setTimeout(() => el.classList.remove('landing'), 500);
}

function spin() {
  const spinBtn  = document.getElementById('spinBtn');
  const addBtn   = document.getElementById('addBtn');
  const gameEl   = document.getElementById('game');
  const methodEl = document.getElementById('method');
  const pokemonEl= document.getElementById('pokemon');

  spinBtn.disabled = true;
  addBtn.disabled  = true;

  gameEl.classList.add('spinning');
  methodEl.classList.add('spinning');
  pokemonEl.classList.add('spinning');

  const selectedGame     = getRandom(GAMES);
  const availableMethods = GAME_DATA[selectedGame].methods;
  const method           = getRandom(availableMethods);
  const availablePokemon = getPokemonForMethod(selectedGame, method);
  const pokemon          = getRandom(availablePokemon);

  let spinCount = 0;
  let phase     = 1;

  const iv = setInterval(() => {
    spinCount++;

    if (phase === 1) {
      gameEl.textContent   = getRandom(GAMES);
      const tm             = getRandom(availableMethods);
      methodEl.textContent = tm;
      pokemonEl.textContent= getRandom(getPokemonForMethod(selectedGame, tm));

      if (spinCount >= 20) {
        landReel(gameEl, selectedGame);
        currentGame = selectedGame;
        spinCount   = 0;
        phase       = 2;
      }

    } else if (phase === 2) {
      const tm             = getRandom(availableMethods);
      methodEl.textContent = tm;
      pokemonEl.textContent= getRandom(getPokemonForMethod(selectedGame, tm));

      if (spinCount >= 30) {
        landReel(methodEl, method);
        currentMethod = method;
        spinCount     = 0;
        phase         = 3;
      }

    } else {
      pokemonEl.textContent = getRandom(availablePokemon);

      if (spinCount >= 30) {
        clearInterval(iv);
        landReel(pokemonEl, pokemon);
        currentResult    = { pokemon, method, game: selectedGame };
        spinBtn.disabled = false;
        addBtn.disabled  = false;
      }
    }
  }, 100);
}

function respinGame() {
  const gameEl    = document.getElementById('game');
  const methodEl  = document.getElementById('method');
  const pokemonEl = document.getElementById('pokemon');
  const newGame   = getRandom(GAMES);
  const newMethod = getRandom(GAME_DATA[newGame].methods);
  const newPokemon= getRandom(getPokemonForMethod(newGame, newMethod));
  landReel(gameEl, newGame);
  landReel(methodEl, newMethod);
  landReel(pokemonEl, newPokemon);
  currentGame   = newGame;
  currentMethod = newMethod;
  currentResult = { pokemon: newPokemon, method: newMethod, game: newGame };
}

function respinMethod() {
  if (!currentGame) return;
  const methodEl  = document.getElementById('method');
  const pokemonEl = document.getElementById('pokemon');
  const newMethod = getRandom(GAME_DATA[currentGame].methods);
  const newPokemon= getRandom(getPokemonForMethod(currentGame, newMethod));
  landReel(methodEl, newMethod);
  landReel(pokemonEl, newPokemon);
  currentMethod = newMethod;
  currentResult = { pokemon: newPokemon, method: newMethod, game: currentGame };
}

function respinPokemon() {
  if (!currentGame || !currentMethod) return;
  const pokemonEl = document.getElementById('pokemon');
  const newPokemon= getRandom(getPokemonForMethod(currentGame, currentMethod));
  landReel(pokemonEl, newPokemon);
  currentResult = { pokemon: newPokemon, method: currentMethod, game: currentGame };
}

// ── ADD / STATUS / DELETE ──
async function addToList() {
  if (!currentResult) return;
  if (!Array.isArray(state[selectedPlayer])) state[selectedPlayer] = [];
  state[selectedPlayer].push({ ...currentResult, id: Date.now(), status: 'pending' });
  await saveState();
  renderTables();
  document.getElementById('addBtn').disabled = true;
  currentResult = null;
}

async function cycleStatus(player, index) {
  const hunt = (state[player] || [])[index];
  if (!hunt) return;
  const next = { pending: 'active', active: 'caught', caught: 'pending' };
  hunt.status = next[hunt.status || 'pending'];
  await saveState();
  renderTables();
}

async function deleteHuntByIndex(player, index) {
  if (!confirm('Delete this hunt?')) return;
  state[player].splice(index, 1);
  await saveState();
  renderTables();
}

// ── RENDER ──
const STATUS_LABEL = { pending: '● Queued', active: '● Hunting...', caught: '✓ Caught!' };

function renderTables() {
  renderTable('dave');
  renderTable('colton');
}

function renderTable(player) {
  const container = document.getElementById(player + 'Table');
  const countEl   = document.getElementById(player + 'Count');
  const hunts     = state[player] || [];

  if (countEl) {
    const caught = hunts.filter(h => h.status === 'caught').length;
    countEl.textContent = hunts.length === 0
      ? '0 hunts'
      : `${caught} / ${hunts.length} caught`;
  }

  if (hunts.length === 0) {
    container.innerHTML = '<div class="empty-state">No hunts yet</div>';
    return;
  }

  container.innerHTML = hunts.map((hunt, i) => {
    const s = hunt.status || 'pending';
    return `
      <div class="hunt-card status-${s}">
        <div class="hunt-cell" title="${hunt.game}">${hunt.game}</div>
        <div class="hunt-cell" title="${hunt.method}">${hunt.method}</div>
        <div class="hunt-cell" title="${hunt.pokemon}">${hunt.pokemon}</div>
        <button class="status-badge ${s}" onclick="cycleStatus('${player}',${i})">${STATUS_LABEL[s]}</button>
        <button class="delete-btn"        onclick="deleteHuntByIndex('${player}',${i})">✕</button>
      </div>`;
  }).join('');
}

loadAndRender();
