<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiny Badge Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #17171e;
  --surface2: #1f1f28;
  --border: #2a2a36;
  --border2: #3a3a4a;
  --text: #e8e8f0;
  --muted: #7a7a90;
  --p1: #4fc3f7;
  --p1bg: rgba(79,195,247,0.08);
  --p1border: rgba(79,195,247,0.3);
  --p2: #ff8a65;
  --p2bg: rgba(255,138,101,0.08);
  --p2border: rgba(255,138,101,0.3);
  --gold: #ffd54f;
  --green: #69f0ae;
  --red: #ff5252;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 50;
}
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 2px; color: var(--gold);
}
.scores { display: flex; gap: 12px; align-items: center; }
.score-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border-radius: 24px;
  padding: 6px 14px; border: 1px solid var(--border);
}
.score-chip.p1 { border-color: var(--p1border); }
.score-chip.p2 { border-color: var(--p2border); }
.score-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.score-val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; }
.score-chip.p1 .score-val { color: var(--p1); }
.score-chip.p2 .score-val { color: var(--p2); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 7px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text); transition: all 0.15s; font-weight: 500;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-primary { background: var(--gold); color: #0e0e12; border-color: var(--gold); font-weight: 600; }
.btn-primary:hover { background: #ffe082; border-color: #ffe082; color: #0e0e12; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-danger { color: var(--red); border-color: rgba(255,82,82,0.3); }
.btn-danger:hover { background: rgba(255,82,82,0.1); border-color: var(--red); }

/* MAIN */
.main { padding: 20px 24px; max-width: 860px; margin: 0 auto; }

/* CAROUSEL NAV */
.carousel-nav {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.nav-arrow {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); width: 40px; height: 40px; border-radius: 50%;
  cursor: pointer; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; user-select: none;
}
.nav-arrow:hover { border-color: var(--gold); color: var(--gold); }
.game-title-wrap { flex: 1; text-align: center; }
.game-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 2px; line-height: 1.1;
}
.game-counter { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 3px; }

.dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border2); cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  flex-shrink: 0;
}
.dot.active { background: var(--gold); transform: scale(1.3); }

/* QUEST CARD */
.quest-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  border-top: 3px solid var(--gold);
}
.card-progress {
  padding: 12px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 7px;
}
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-name {
  font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
  width: 56px; flex-shrink: 0;
}
.progress-name.p1 { color: var(--p1); }
.progress-name.p2 { color: var(--p2); }
.progress-bar-bg {
  flex: 1; height: 5px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.progress-bar-fill.p1 { background: var(--p1); }
.progress-bar-fill.p2 { background: var(--p2); }
.progress-count {
  font-size: 11px; font-family: 'DM Mono', monospace;
  width: 28px; text-align: right; flex-shrink: 0;
}
.progress-count.p1 { color: var(--p1); }
.progress-count.p2 { color: var(--p2); }

.slot-table-header {
  display: grid; grid-template-columns: 150px 1fr 1fr;
  padding: 8px 16px; background: rgba(0,0,0,0.2);
  border-bottom: 1px solid var(--border);
}
.slot-table-header span {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; font-family: 'DM Mono', monospace;
}
.slot-table-header .th-dave { color: var(--p1); padding-left: 14px; }
.slot-table-header .th-colton { color: var(--p2); padding-left: 14px; }
.slot-table-header .th-slot { color: var(--muted); }

/* SLOT ROW */
.slot-row {
  display: grid; grid-template-columns: 150px 1fr 1fr;
  border-bottom: 1px solid var(--border); min-height: 74px;
}
.slot-row:last-child { border-bottom: none; }
.slot-label {
  padding: 12px 16px; display: flex; flex-direction: column;
  justify-content: center; border-right: 1px solid var(--border);
  background: rgba(0,0,0,0.12);
}
.slot-label-num {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
}
.slot-label-name { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 2px; }
.slot-label-name.starter { color: var(--gold); }
.slot-label-sub { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }

/* CATCH CELL */
.catch-cell {
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background 0.15s;
  border-right: 1px solid var(--border); position: relative;
}
.catch-cell:last-child { border-right: none; }
.catch-cell:hover { background: var(--surface2); }
.catch-cell.filled-p1 { background: var(--p1bg); }
.catch-cell.filled-p2 { background: var(--p2bg); }
.catch-cell.filled-p1:hover { background: rgba(79,195,247,0.14); }
.catch-cell.filled-p2:hover { background: rgba(255,138,101,0.14); }

.shiny-sprite { width: 52px; height: 52px; image-rendering: pixelated; flex-shrink: 0; }
.sprite-placeholder {
  width: 52px; height: 52px;
  border: 2px dashed var(--border2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 18px; color: var(--border2);
  transition: border-color 0.15s, color 0.15s;
}
.catch-cell:hover .sprite-placeholder { border-color: var(--border2); color: var(--muted); }
.catch-cell.filled-p1:hover .sprite-placeholder,
.catch-cell.filled-p2:hover .sprite-placeholder { border-color: transparent; }

.catch-info { flex: 1; min-width: 0; }
.catch-mon-name {
  font-size: 13px; font-weight: 600; text-transform: capitalize;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.catch-cell.filled-p1 .catch-mon-name { color: var(--p1); }
.catch-cell.filled-p2 .catch-mon-name { color: var(--p2); }
.catch-empty-hint { font-size: 11px; color: var(--muted); font-style: italic; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 24px;
  width: 380px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
}
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--gold); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; font-family: 'DM Mono', monospace; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 5px; }
.form-input {
  width: 100%; padding: 9px 12px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text); font-size: 13px;
  font-family: 'DM Sans', sans-serif; transition: border-color 0.15s; outline: none;
}
.form-input:focus { border-color: var(--gold); }

.sprite-preview-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 20px; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); margin: 16px 0; min-height: 130px; justify-content: center;
}
.sprite-preview-wrap img { width: 96px; height: 96px; image-rendering: pixelated; }
.sprite-preview-name { font-size: 14px; font-weight: 600; text-transform: capitalize; color: var(--gold); font-family: 'DM Mono', monospace; }
.sprite-status { font-size: 12px; color: var(--muted); font-style: italic; text-align: center; }
.sprite-status.found { color: var(--green); font-style: normal; }
.sprite-status.notfound { color: var(--red); font-style: normal; }

.catch-nature { font-size: 10px; font-family: 'DM Mono', monospace; margin-top: 2px; }
.tier-primary { color: var(--gold); }
.tier-alt1    { color: var(--green); }
.tier-alt2    { color: var(--p1); }
.tier-unlisted{ color: var(--muted); }
.tier-neutral { color: #9e9e9e; }
.tier-worst   { color: var(--red); }
.score-pts { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-left: 4px; }

.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; align-items: center; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface); border: 1px solid var(--border2);
  border-left: 3px solid var(--green);
  border-radius: var(--radius); padding: 12px 18px;
  font-size: 13px; z-index: 300;
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 600px) {
  .slot-table-header, .slot-row { grid-template-columns: 110px 1fr 1fr; }
  .slot-label { padding: 10px 10px; }
  .catch-cell { padding: 8px 10px; gap: 7px; }
  .shiny-sprite, .sprite-placeholder { width: 44px; height: 44px; }
  .game-title { font-size: 20px; }
  .header { padding: 12px 16px; }
  .main { padding: 14px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">✦ Shiny Badge Quest</div>
  <div class="scores">
    <div class="score-chip p1">
      <span class="score-label">Dave</span>
      <span class="score-val" id="p1total">0 pts</span>
      <span class="score-pts" id="p1catches">0/96</span>
    </div>
    <div class="score-chip p2">
      <span class="score-label">Colton</span>
      <span class="score-val" id="p2total">0 pts</span>
      <span class="score-pts" id="p2catches">0/96</span>
    </div>
  </div>
  <div class="header-actions">
    <span id="syncStatus" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)">⟳ Connecting...</span>
    <button class="btn" onclick="exportData()">Export</button>
    <button class="btn" onclick="importData()">Import</button>
    <button class="btn" style="color:var(--red);border-color:rgba(255,82,82,0.3)" onclick="resetAll()">Reset</button>
  </div>
</div>

<div class="main">
  <div class="carousel-nav">
    <button class="nav-arrow" onclick="prevGame()" title="Previous game (←)">‹</button>
    <div class="game-title-wrap">
      <div class="game-title" id="gameTitleDisplay"></div>
      <div class="game-counter" id="gameCounter"></div>
    </div>
    <button class="nav-arrow" onclick="nextGame()" title="Next game (→)">›</button>
  </div>
  <div class="dots" id="dots"></div>
  <div id="questCard"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Log Shiny</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="form-group">
      <label class="form-label">Pokémon Name</label>
      <input class="form-input" type="text" id="fMon" placeholder="e.g. gyarados"
        autocomplete="off" spellcheck="false"
        oninput="onMonInput()" onkeydown="if(event.key==='Enter')saveCatch()">
    </div>
    <div class="sprite-preview-wrap" id="spritePreview">
      <div class="sprite-status">Type a Pokémon name to search</div>
    </div>
    <div class="form-group" id="natureGroup" style="display:none">
      <label class="form-label">Nature</label>
      <select class="form-input" id="fNature" onchange="onNatureChange()">
        <option value="">— Select nature —</option>
        <option>Adamant</option><option>Bashful</option><option>Bold</option>
        <option>Brave</option><option>Calm</option><option>Careful</option>
        <option>Docile</option><option>Gentle</option><option>Hardy</option>
        <option>Hasty</option><option>Impish</option><option>Jolly</option>
        <option>Lax</option><option>Lonely</option><option>Mild</option>
        <option>Modest</option><option>Naive</option><option>Naughty</option>
        <option>Quiet</option><option>Quirky</option><option>Rash</option>
        <option>Relaxed</option><option>Sassy</option><option>Serious</option>
        <option>Timid</option>
      </select>
      <div id="natureTierHint" style="margin-top:5px;font-size:11px;font-family:'DM Mono',monospace;min-height:16px;"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="clearBtn" onclick="clearSlot()" style="display:none;margin-right:auto">Remove</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveCatch()" disabled>Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// GAMES
// ============================================================
var GAMES = [
  { id:'frlg',  label:'Fire Red / Leaf Green',             color:'#e53935' },
  { id:'rse',   label:'Ruby / Sapphire / Emerald',         color:'#ef6c00' },
  { id:'dpp',   label:'Diamond / Pearl / Platinum',        color:'#3949ab' },
  { id:'hgss',  label:'Heart Gold / Soul Silver',          color:'#f9a825' },
  { id:'bw',    label:'Black / White',                     color:'#90a4ae' },
  { id:'b2w2',  label:'Black 2 / White 2',                 color:'#7986cb' },
  { id:'xy',    label:'X / Y',                             color:'#0288d1' },
  { id:'usum',  label:'Ultra Sun / Ultra Moon',            color:'#f57f17' },
  { id:'lgpe',  label:"Let's Go Pikachu / Let's Go Eevee", color:'#ffca28' },
  { id:'swsh',  label:'Sword / Shield',                    color:'#e65100' },
  { id:'bdsp',  label:'Brilliant Diamond / Shining Pearl', color:'#1e88e5' },
  { id:'sv',    label:'Scarlet / Violet',                  color:'#c62828' },
];

var SLOTS = [
  { num:'Slot 1', name:'Starter',       sub:'Before Gym 1' },
  { num:'Slot 2', name:'Before Gym 2',  sub:'' },
  { num:'Slot 3', name:'Before Gym 3',  sub:'' },
  { num:'Slot 4', name:'Before Gym 4',  sub:'' },
  { num:'Slot 5', name:'Before Gym 5',  sub:'' },
  { num:'Slot 6', name:'Before Gym 6',  sub:'' },
  { num:'Slot 7', name:'Before Gym 7',  sub:'' },
  { num:'Slot 8', name:'Before Gym 8',  sub:'' },
];

// ============================================================
// NATURE DATA + SCORING
// ============================================================
var NATURE_DATA = {};

async function loadNatureData() {
  try {
    var res = await fetch('All_Pokemon_Natures_Complete.csv');
    var text = await res.text();
    var lines = text.trim().split('\n');
    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].split(',');
      if (cols.length < 5) continue;
      var key = cols[0].trim().toLowerCase();
      NATURE_DATA[key] = { p: cols[1].trim(), a1: cols[2].trim(), a2: cols[3].trim(), w: cols[4].trim() };
    }
  } catch(e) { console.warn('Nature CSV unavailable'); }
}

var NEUTRAL_NATURES = ['Hardy','Docile','Bashful','Quirky','Serious'];

function getNatureScore(mon, nature) {
  if (!mon || !nature) return null;
  var n = nature.charAt(0).toUpperCase() + nature.slice(1).toLowerCase();
  if (NEUTRAL_NATURES.indexOf(n) !== -1) return 9;
  var e = NATURE_DATA[mon.toLowerCase()];
  if (!e) return 11;
  if (n === e.p)  return 25;
  if (n === e.a1) return 18;
  if (n === e.a2) return 14;
  if (n === e.w)  return 7;
  return 11;
}

function getNatureTier(mon, nature) {
  if (!mon || !nature) return null;
  var n = nature.charAt(0).toUpperCase() + nature.slice(1).toLowerCase();
  if (NEUTRAL_NATURES.indexOf(n) !== -1) return 'neutral';
  var e = NATURE_DATA[mon.toLowerCase()];
  if (!e) return 'unlisted';
  if (n === e.p)  return 'primary';
  if (n === e.a1) return 'alt1';
  if (n === e.a2) return 'alt2';
  if (n === e.w)  return 'worst';
  return 'unlisted';
}

// ============================================================
// JSONBIN SYNC
// ============================================================
var MASTER_KEY = '$2a$10$y78gUbDpbg0cgnCLtYOgO.YI6kWqvi1Z0F45uFkoC2cpPACtN.G7y';
var binId = '69ed383a856a6821897180c7';
var autoRefreshInterval = null;

function setSyncStatus(s, msg) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = {ok:'var(--green)',err:'var(--red)',loading:'var(--gold)',idle:'var(--muted)'}[s] || 'var(--muted)';
}

async function pushState(state) {
  setSyncStatus('loading', '⟳ Saving...');
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b/' + binId, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
      body:JSON.stringify(state)
    });
    if (!res.ok) { setSyncStatus('err','✗ Save failed'); return; }
    setSyncStatus('ok','✓ Saved ' + new Date().toLocaleTimeString());
  } catch(e) { setSyncStatus('err','✗ Save failed'); }
}

async function pullState() {
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
      headers:{'X-Master-Key':MASTER_KEY}
    });
    var d = await res.json();
    return d.record || null;
  } catch(e) { return null; }
}

function defaultState() { return { quest:{} }; }

function loadLocal() {
  try { return JSON.parse(localStorage.getItem('shinyQuest') || 'null'); } catch(e) { return null; }
}

function saveState(state) {
  localStorage.setItem('shinyQuest', JSON.stringify(state));
  pushState(state);
}

function getState() {
  var s = loadLocal() || defaultState();
  if (!s.quest) s.quest = {};
  return s;
}

async function loadAndRender() {
  setSyncStatus('loading','⟳ Loading...');
  var state = await pullState();
  if (!state) state = loadLocal();
  if (!state) state = defaultState();
  if (!state.quest) state.quest = {};
  localStorage.setItem('shinyQuest', JSON.stringify(state));
  setSyncStatus('ok','✓ Loaded ' + new Date().toLocaleTimeString());
  render();
  startAutoRefresh();
}

function startAutoRefresh() {
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(async function() {
    if (document.hidden) return;
    var state = await pullState();
    if (!state) return;
    localStorage.setItem('shinyQuest', JSON.stringify(state));
    render();
    setSyncStatus('ok','✓ Refreshed ' + new Date().toLocaleTimeString());
  }, 30000);
}

// ============================================================
// CAROUSEL
// ============================================================
var currentGameIdx = 0;

function prevGame() { currentGameIdx = (currentGameIdx - 1 + GAMES.length) % GAMES.length; render(); }
function nextGame() { currentGameIdx = (currentGameIdx + 1) % GAMES.length; render(); }
function goToGame(i) { currentGameIdx = i; render(); }

// ============================================================
// MODAL
// ============================================================
var _gameId = null, _slot = null, _player = null;
var _pendingSprite = null, _pendingName = null;
var _fetchTimer = null;

function openModal(gameId, slot, player) {
  _gameId = gameId; _slot = slot; _player = player;
  _pendingSprite = null; _pendingName = null;

  var state = getState();
  var key = gameId + '-' + slot + '-' + player;
  var existing = state.quest[key];
  var game = GAMES.find(function(g){ return g.id === gameId; });
  var playerName = player === 1 ? 'Dave' : 'Colton';

  document.getElementById('modalTitle').textContent = SLOTS[slot].name;
  document.getElementById('modalSub').textContent = game.label + ' · ' + playerName;
  document.getElementById('fMon').value = existing ? existing.mon : '';
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('clearBtn').style.display = existing ? 'block' : 'none';

  var preview = document.getElementById('spritePreview');
  if (existing) {
    _pendingSprite = existing.sprite;
    _pendingName = existing.mon;
    preview.innerHTML =
      '<img src="' + existing.sprite + '" style="width:96px;height:96px;image-rendering:pixelated">' +
      '<div class="sprite-preview-name">' + existing.mon + '</div>' +
      '<div class="sprite-status found">✓ Shiny sprite loaded</div>';
    document.getElementById('natureGroup').style.display = 'block';
    document.getElementById('fNature').value = existing.nature || '';
    onNatureChange();
    if (!existing.nature) document.getElementById('saveBtn').disabled = false;
  } else {
    preview.innerHTML = '<div class="sprite-status">Type a Pokémon name to search</div>';
    document.getElementById('natureGroup').style.display = 'none';
  }

  document.getElementById('modal').classList.add('open');
  setTimeout(function(){ document.getElementById('fMon').focus(); }, 80);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('natureGroup').style.display = 'none';
  if (_fetchTimer) clearTimeout(_fetchTimer);
}

function onNatureChange() {
  var nature = document.getElementById('fNature').value;
  document.getElementById('saveBtn').disabled = !(_pendingSprite && nature);
  var hint = document.getElementById('natureTierHint');
  if (_pendingName && nature) {
    var tier = getNatureTier(_pendingName, nature);
    var score = getNatureScore(_pendingName, nature);
    var labels = { primary:'Primary Nature', alt1:'Alternative 1', alt2:'Alternative 2', neutral:'Neutral Nature', worst:'Worst Nature', unlisted:'Unlisted Nature' };
    hint.textContent = labels[tier] + ' · ' + score + ' pts';
    hint.className = 'tier-' + tier;
  } else {
    hint.textContent = '';
  }
}

function onMonInput() {
  var name = document.getElementById('fMon').value.trim();
  _pendingSprite = null; _pendingName = null;
  document.getElementById('saveBtn').disabled = true;
  if (_fetchTimer) clearTimeout(_fetchTimer);

  var preview = document.getElementById('spritePreview');
  if (!name) {
    preview.innerHTML = '<div class="sprite-status">Type a Pokémon name to search</div>';
    return;
  }
  preview.innerHTML = '<div class="sprite-status">Searching...</div>';
  _fetchTimer = setTimeout(function(){ fetchPokemon(name); }, 480);
}

async function fetchPokemon(name) {
  var preview = document.getElementById('spritePreview');
  var slug = name.toLowerCase().trim().replace(/\s+/g, '-');
  try {
    var res = await fetch('https://pokeapi.co/api/v2/pokemon/' + encodeURIComponent(slug));
    if (!res.ok) throw new Error('not found');
    var data = await res.json();
    var sprite = data.sprites.front_shiny || data.sprites.front_default;
    if (!sprite) throw new Error('no sprite');
    _pendingSprite = sprite;
    _pendingName = data.name;
    document.getElementById('natureGroup').style.display = 'block';
    document.getElementById('fNature').value = '';
    document.getElementById('natureTierHint').textContent = '';
    document.getElementById('saveBtn').disabled = true;
    preview.innerHTML =
      '<img src="' + sprite + '" style="width:96px;height:96px;image-rendering:pixelated">' +
      '<div class="sprite-preview-name">' + data.name + '</div>' +
      '<div class="sprite-status found">✓ Shiny sprite found</div>';
  } catch(e) {
    _pendingSprite = null; _pendingName = null;
    document.getElementById('saveBtn').disabled = true;
    preview.innerHTML = '<div class="sprite-status notfound">✗ Not found — try lowercase with hyphens (e.g. mr-mime)</div>';
  }
}

function saveCatch() {
  if (!_pendingSprite || !_pendingName) return;
  var state = getState();
  var key = _gameId + '-' + _slot + '-' + _player;
  var nature = document.getElementById('fNature').value;
  state.quest[key] = { mon: _pendingName, sprite: _pendingSprite, nature: nature || null, ts: Date.now() };
  saveState(state);
  closeModal();
  render();
  showToast(_pendingName + ' caught for ' + (_player === 1 ? 'Dave' : 'Colton') + '!');
}

function clearSlot() {
  if (!confirm('Remove this entry?')) return;
  var state = getState();
  delete state.quest[_gameId + '-' + _slot + '-' + _player];
  saveState(state);
  closeModal();
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  var state = getState();
  renderScores(state);
  renderDots();
  renderCard(state);
}

function renderScores(state) {
  var p1pts = 0, p2pts = 0, p1c = 0, p2c = 0;
  var total = GAMES.length * 8;
  Object.keys(state.quest).forEach(function(key) {
    var val = state.quest[key];
    var p = parseInt(key.charAt(key.length - 1));
    var score = val.nature ? (getNatureScore(val.mon, val.nature) || 0) : 0;
    if (p === 1) { p1pts += score; p1c++; }
    else if (p === 2) { p2pts += score; p2c++; }
  });
  document.getElementById('p1total').textContent = p1pts + ' pts';
  document.getElementById('p2total').textContent = p2pts + ' pts';
  document.getElementById('p1catches').textContent = p1c + '/' + total;
  document.getElementById('p2catches').textContent = p2c + '/' + total;
}

function renderDots() {
  document.getElementById('dots').innerHTML = GAMES.map(function(g, i) {
    return '<div class="dot' + (i === currentGameIdx ? ' active' : '') +
      '" onclick="goToGame(' + i + ')" title="' + g.label + '"></div>';
  }).join('');
}

function renderCard(state) {
  var game = GAMES[currentGameIdx];
  var titleEl = document.getElementById('gameTitleDisplay');
  titleEl.textContent = game.label;
  titleEl.style.color = game.color;
  document.getElementById('gameCounter').textContent = (currentGameIdx + 1) + ' / ' + GAMES.length;

  var p1done = 0, p2done = 0, p1pts = 0, p2pts = 0;
  for (var s = 0; s < 8; s++) {
    var _c1 = state.quest[game.id + '-' + s + '-1'];
    var _c2 = state.quest[game.id + '-' + s + '-2'];
    if (_c1) { p1done++; if (_c1.nature) p1pts += getNatureScore(_c1.mon, _c1.nature) || 0; }
    if (_c2) { p2done++; if (_c2.nature) p2pts += getNatureScore(_c2.mon, _c2.nature) || 0; }
  }

  var html = '<div class="quest-card" style="border-top-color:' + game.color + '">';

  // Progress
  html += '<div class="card-progress">' +
    '<div class="progress-row">' +
      '<span class="progress-name p1">Dave</span>' +
      '<div class="progress-bar-bg"><div class="progress-bar-fill p1" style="width:' + Math.round(p1done/8*100) + '%"></div></div>' +
      '<span class="progress-count p1">' + p1done + '/8</span>' +
      '<span style="font-size:10px;font-family:\'DM Mono\',monospace;color:var(--p1);width:48px;text-align:right;flex-shrink:0">' + (p1pts ? p1pts + 'pts' : '') + '</span>' +
    '</div>' +
    '<div class="progress-row">' +
      '<span class="progress-name p2">Colton</span>' +
      '<div class="progress-bar-bg"><div class="progress-bar-fill p2" style="width:' + Math.round(p2done/8*100) + '%"></div></div>' +
      '<span class="progress-count p2">' + p2done + '/8</span>' +
      '<span style="font-size:10px;font-family:\'DM Mono\',monospace;color:var(--p2);width:48px;text-align:right;flex-shrink:0">' + (p2pts ? p2pts + 'pts' : '') + '</span>' +
    '</div>' +
  '</div>';

  // Column headers
  html += '<div class="slot-table-header">' +
    '<span class="th-slot">Slot</span>' +
    '<span class="th-dave">Dave</span>' +
    '<span class="th-colton">Colton</span>' +
  '</div>';

  // 8 slot rows
  for (var s = 0; s < 8; s++) {
    var sl = SLOTS[s];
    var c1 = state.quest[game.id + '-' + s + '-1'];
    var c2 = state.quest[game.id + '-' + s + '-2'];

    html += '<div class="slot-row">';

    // Label column
    html += '<div class="slot-label">' +
      '<span class="slot-label-num">' + sl.num + '</span>' +
      '<span class="slot-label-name' + (s === 0 ? ' starter' : '') + '">' + sl.name + '</span>' +
      (sl.sub ? '<span class="slot-label-sub">' + sl.sub + '</span>' : '') +
    '</div>';

    // Dave cell
    html += '<div class="catch-cell' + (c1 ? ' filled-p1' : '') + '" onclick="openModal(\'' + game.id + '\',' + s + ',1)">';
    if (c1) {
      var t1 = c1.nature ? getNatureTier(c1.mon, c1.nature) : null;
      var sc1 = c1.nature ? getNatureScore(c1.mon, c1.nature) : null;
      html += '<img src="' + c1.sprite + '" class="shiny-sprite" onerror="this.style.opacity=\'0.3\'">';
      html += '<div class="catch-info"><div class="catch-mon-name">' + c1.mon + '</div>';
      if (c1.nature) html += '<div class="catch-nature tier-' + t1 + '">' + c1.nature + ' · ' + sc1 + 'pts</div>';
      html += '</div>';
    } else {
      html += '<div class="sprite-placeholder">+</div><div class="catch-info"><div class="catch-empty-hint">tap to add</div></div>';
    }
    html += '</div>';

    // Colton cell
    html += '<div class="catch-cell' + (c2 ? ' filled-p2' : '') + '" onclick="openModal(\'' + game.id + '\',' + s + ',2)">';
    if (c2) {
      var t2 = c2.nature ? getNatureTier(c2.mon, c2.nature) : null;
      var sc2 = c2.nature ? getNatureScore(c2.mon, c2.nature) : null;
      html += '<img src="' + c2.sprite + '" class="shiny-sprite" onerror="this.style.opacity=\'0.3\'">';
      html += '<div class="catch-info"><div class="catch-mon-name">' + c2.mon + '</div>';
      if (c2.nature) html += '<div class="catch-nature tier-' + t2 + '">' + c2.nature + ' · ' + sc2 + 'pts</div>';
      html += '</div>';
    } else {
      html += '<div class="sprite-placeholder">+</div><div class="catch-info"><div class="catch-empty-hint">tap to add</div></div>';
    }
    html += '</div>';

    html += '</div>';
  }

  html += '</div>';
  document.getElementById('questCard').innerHTML = html;
}

// ============================================================
// EXPORT / IMPORT / RESET
// ============================================================
function exportData() {
  var blob = new Blob([JSON.stringify(getState(), null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shiny-quest-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        localStorage.setItem('shinyQuest', JSON.stringify(data));
        pushState(data);
        render();
        showToast('Data imported');
      } catch(err) { alert('Invalid JSON file'); }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

function resetAll() {
  if (!confirm('Reset all quest data? This cannot be undone.')) return;
  var state = defaultState();
  localStorage.setItem('shinyQuest', JSON.stringify(state));
  pushState(state);
  render();
  showToast('Quest reset');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// ============================================================
// EVENTS
// ============================================================
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (document.getElementById('modal').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') prevGame();
  if (e.key === 'ArrowRight') nextGame();
});

// ============================================================
// INIT
// ============================================================
loadNatureData().then(loadAndRender);
</script>
</body>
</html>
