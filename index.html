<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shiny Bounty Board</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

  <header class="header">
    <h1 class="title">★ Shiny Bounty Board ★</h1>
    <span id="syncStatus" class="sync-pill">● Connecting...</span>
  </header>

  <div class="board">

    <div class="column">
      <div class="col-header dave">Dave</div>
      <div class="bounties" id="daveBounties"></div>
      <button class="roll-btn dave" onclick="addSpin('dave')">🎲 Roll Bounty</button>
    </div>

    <div class="column">
      <div class="col-header colton">Colton</div>
      <div class="bounties" id="coltonBounties"></div>
      <button class="roll-btn colton" onclick="addSpin('colton')">🎲 Roll Bounty</button>
    </div>

  </div>
</div>

<script src="encounter_data.js"></script>
<script src="sync.js"></script>
<script src="game.js"></script>
</body>
</html>
