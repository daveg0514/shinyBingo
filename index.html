<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiny Hunt Slot Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #17171e;
  --surface2: #1f1f28;
  --border: #2a2a36;
  --text: #e8e8f0;
  --muted: #7a7a90;
  --dave: #4fc3f7;
  --colton: #ff8a65;
  --gold: #ffd54f;
  --green: #69f0ae;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'DM Sans', sans-serif; 
  padding: 20px;
  min-height: 100vh;
}

.container { max-width: 1200px; margin: 0 auto; }

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 30px;
}

.slot-machine {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 30px;
  margin-bottom: 30px;
}

.slots {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}

.slot {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
}

.slot-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  font-family: 'DM Mono', monospace;
}

.slot-value {
  font-size: 24px;
  font-weight: 600;
  color: var(--gold);
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
}

.slot-value.spinning {
  animation: spin 0.1s linear infinite;
}

@keyframes spin {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.controls {
  display: flex;
  gap: 15px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

.player-select {
  display: flex;
  gap: 10px;
}

.player-btn {
  padding: 10px 20px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  transition: all 0.2s;
  font-weight: 500;
}

.player-btn.dave { border-color: var(--dave); }
.player-btn.colton { border-color: var(--colton); }
.player-btn.dave.active { background: var(--dave); color: #000; }
.player-btn.colton.active { background: var(--colton); color: #000; }

.spin-btn {
  padding: 12px 40px;
  font-size: 16px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  background: var(--gold);
  color: #000;
  transition: all 0.2s;
  font-weight: 600;
}

.spin-btn:hover { background: #ffe082; transform: scale(1.05); }
.spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: scale(1); }

.add-btn {
  padding: 10px 30px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid var(--green);
  background: var(--surface2);
  color: var(--green);
  transition: all 0.2s;
  font-weight: 600;
}

.add-btn:hover { background: var(--green); color: #000; }
.add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.tables {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.table-container {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.table-header {
  padding: 15px 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 1px;
  border-bottom: 2px solid var(--border);
}

.table-header.dave { background: rgba(79,195,247,0.1); color: var(--dave); border-top: 3px solid var(--dave); }
.table-header.colton { background: rgba(255,138,101,0.1); color: var(--colton); border-top: 3px solid var(--colton); }

.table {
  width: 100%;
  border-collapse: collapse;
}

.table thead {
  background: var(--surface2);
}

.table th {
  padding: 10px;
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  border-bottom: 1px solid var(--border);
}

.table td {
  padding: 12px 10px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.table tr:last-child td {
  border-bottom: none;
}

.table tr:hover {
  background: var(--surface2);
}

.delete-btn {
  background: none;
  border: none;
  color: #ff5252;
  cursor: pointer;
  font-size: 16px;
  padding: 0;
}

.delete-btn:hover { color: #ff8a80; }

.empty-state {
  padding: 40px;
  text-align: center;
  color: var(--muted);
  font-style: italic;
}

@media (max-width: 768px) {
  .slots { grid-template-columns: 1fr; }
  .tables { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <div style="display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:30px;">
    <h1 style="margin:0">✦ Shiny Hunt Slot Machine ✦</h1>
    <span id="syncStatus" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)">⟳ Connecting...</span>
  </div>

  <div class="slot-machine">
    <div class="slots">
      <div class="slot">
        <div class="slot-label">Game (Spins First)</div>
        <div class="slot-value" id="game">???</div>
        <button class="btn" onclick="respinGame()" style="margin-top:10px;width:100%;font-size:11px">⟳ Respin Game</button>
      </div>
      <div class="slot">
        <div class="slot-label">Method</div>
        <div class="slot-value" id="method">???</div>
        <button class="btn" onclick="respinMethod()" style="margin-top:10px;width:100%;font-size:11px">⟳ Respin Method</button>
      </div>
      <div class="slot">
        <div class="slot-label">Pokémon</div>
        <div class="slot-value" id="pokemon">???</div>
        <button class="btn" onclick="respinPokemon()" style="margin-top:10px;width:100%;font-size:11px">⟳ Respin Pokémon</button>
      </div>
    </div>

    <div class="controls">
      <div class="player-select">
        <button class="player-btn dave active" onclick="selectPlayer('dave')">Dave</button>
        <button class="player-btn colton" onclick="selectPlayer('colton')">Colton</button>
      </div>
      <button class="spin-btn" onclick="spin()" id="spinBtn">Spin!</button>
      <button class="add-btn" onclick="addToList()" id="addBtn" disabled>Add to List</button>
    </div>
  </div>

  <div class="tables">
    <div class="table-container">
      <div class="table-header dave">Dave's Hunts</div>
      <table class="table">
        <thead>
          <tr>
            <th>Game</th>
            <th>Method</th>
            <th>Pokémon</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody id="daveTable">
          <tr><td colspan="4" class="empty-state">No hunts yet</td></tr>
        </tbody>
      </table>
    </div>

    <div class="table-container">
      <div class="table-header colton">Colton's Hunts</div>
      <table class="table">
        <thead>
          <tr>
            <th>Game</th>
            <th>Method</th>
            <th>Pokémon</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody id="coltonTable">
          <tr><td colspan="4" class="empty-state">No hunts yet</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

// Get Pokemon available in a specific generation
function getPokemonForGen(gen) {
  let available = [];
  for (let i = 1; i <= gen; i++) {
    available = available.concat(pokemonByGen[i]);
  }
  return available;
}

// Get Pokemon based on game and method
function getPokemonForMethod(game, method) {
  const gameData = GAME_DATA[game];
  
  // Check for method-specific lists
  if (method === 'Soft Reset (Starters)' && gameData.starters) {
    return gameData.starters;
  }
  if (method === 'Soft Reset (Legendaries)' && gameData.legendaries) {
    return gameData.legendaries;
  }
  if (method === 'Ultra Wormhole' && gameData.ultraWormhole) {
    return gameData.ultraWormhole;
  }
  if (method === 'Dynamax Adventure' && gameData.dynamaxAdventure) {
    return gameData.dynamaxAdventure;
  }
  
  // For all other methods (Random Encounter, Masuda Method, etc.), return all Pokemon up to that gen
  return getPokemonForGen(gameData.gen);
}

var MASTER_KEY = '$2a$10$y78gUbDpbg0cgnCLtYOgO.YI6kWqvi1Z0F45uFkoC2cpPACtN.G7y';
var binId = '69ed383a856a6821897180c7';
var autoRefreshInterval = null;

function setSyncStatus(s, msg) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = {ok:'var(--green)',err:'var(--red)',loading:'var(--gold)',idle:'var(--muted)'}[s] || 'var(--muted)';
}

async function pushState(stateData) {
  setSyncStatus('loading', '⟳ Saving...');
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b/' + binId, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
      body:JSON.stringify(stateData)
    });
    if (!res.ok) { 
      setSyncStatus('err','✗ Save failed'); 
      return false;
    }
    setSyncStatus('ok','✓ Saved ' + new Date().toLocaleTimeString());
    return true;
  } catch(e) { 
    setSyncStatus('err','✗ Save failed'); 
    return false;
  }
}

async function pullState() {
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', {
      headers:{'X-Master-Key':MASTER_KEY}
    });
    var d = await res.json();
    return d.record || null;
  } catch(e) { return null; }
}

function defaultState() { return { dave: [], colton: [] }; }

function startAutoRefresh() {
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(async function() {
    if (document.hidden) return;
    var serverState = await pullState();
    if (!serverState) return;
    state = serverState;
    localStorage.setItem('shinyHunts', JSON.stringify(state));
    renderTables();
    setSyncStatus('ok','✓ Refreshed ' + new Date().toLocaleTimeString());
  }, 10000); // Changed from 30000 to 10000 (10 seconds)
}

    try {

        state = JSON.parse(saved);
      } else {
        state = defaultState();
      }
    } catch(e) {
      state = defaultState();
    }
  }
  localStorage.setItem('shinyHunts', JSON.stringify(state));
  setSyncStatus('ok','✓ Loaded ' + new Date().toLocaleTimeString());
  renderTables();
  startAutoRefresh();
}

async function saveState() {
  localStorage.setItem('shinyHunts', JSON.stringify(state));
  await pushState(state);
}

function selectPlayer(player) {
  selectedPlayer = player;
  document.querySelectorAll('.player-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  document.querySelector('.player-btn.' + player).classList.add('active');
}

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function spin() {
  const spinBtn = document.getElementById('spinBtn');
  const addBtn = document.getElementById('addBtn');
  const pokemonEl = document.getElementById('pokemon');
  const methodEl = document.getElementById('method');
  const gameEl = document.getElementById('game');
  
  spinBtn.disabled = true;
  addBtn.disabled = true;
  
  // Add spinning animation
  pokemonEl.classList.add('spinning');
  methodEl.classList.add('spinning');
  gameEl.classList.add('spinning');
  
  // First, select a game
  const selectedGame = getRandom(GAMES);
  const gameData = GAME_DATA[selectedGame];
  const availableMethods = gameData.methods;
  
  // Spin for 2 seconds
  let spinCount = 0;
  const spinInterval = setInterval(() => {
    gameEl.textContent = getRandom(GAMES);
    const tempMethod = getRandom(availableMethods);
    methodEl.textContent = tempMethod;
    const tempPokemon = getPokemonForMethod(selectedGame, tempMethod);
    pokemonEl.textContent = getRandom(tempPokemon);
    spinCount++;
    
    if (spinCount > 20) {
      clearInterval(spinInterval);
      
      // Final result - game already selected, now pick method and pokemon from valid options
      const method = getRandom(availableMethods);
      const availablePokemon = getPokemonForMethod(selectedGame, method);
      const pokemon = getRandom(availablePokemon);
      
      gameEl.textContent = selectedGame;
      methodEl.textContent = method;
      pokemonEl.textContent = pokemon;
      
      pokemonEl.classList.remove('spinning');
      methodEl.classList.remove('spinning');
      gameEl.classList.remove('spinning');
      
      currentGame = selectedGame;
      currentMethod = method;
      currentResult = { 
        pokemon: pokemon, 
        method: method, 
        game: selectedGame 
      };
      
      spinBtn.disabled = false;
      addBtn.disabled = false;
    }
  }, 100);
}

function respinGame() {
  const gameEl = document.getElementById('game');
  const methodEl = document.getElementById('method');
  const pokemonEl = document.getElementById('pokemon');
  
  // Pick new game
  const newGame = getRandom(GAMES);
  gameEl.textContent = newGame;
  currentGame = newGame;
  
  // Update method to be valid for new game
  const gameData = GAME_DATA[newGame];
  const newMethod = getRandom(gameData.methods);
  methodEl.textContent = newMethod;
  currentMethod = newMethod;
  
  // Update pokemon to be valid for new game/method
  const availablePokemon = getPokemonForMethod(newGame, newMethod);
  const newPokemon = getRandom(availablePokemon);
  pokemonEl.textContent = newPokemon;
  
  // Update result
  currentResult = {
    pokemon: newPokemon,
    method: newMethod,
    game: newGame
  };
}

function respinMethod() {
  if (!currentGame) return;
  
  const methodEl = document.getElementById('method');
  const pokemonEl = document.getElementById('pokemon');
  
  // Pick new method for current game
  const gameData = GAME_DATA[currentGame];
  const newMethod = getRandom(gameData.methods);
  methodEl.textContent = newMethod;
  currentMethod = newMethod;
  
  // Update pokemon to be valid for new method
  const availablePokemon = getPokemonForMethod(currentGame, newMethod);
  const newPokemon = getRandom(availablePokemon);
  pokemonEl.textContent = newPokemon;
  
  // Update result
  currentResult = {
    pokemon: newPokemon,
    method: newMethod,
    game: currentGame
  };
}

function respinPokemon() {
  if (!currentGame || !currentMethod) return;
  
  const pokemonEl = document.getElementById('pokemon');
  
  // Pick new pokemon for current game/method
  const availablePokemon = getPokemonForMethod(currentGame, currentMethod);
  const newPokemon = getRandom(availablePokemon);
  pokemonEl.textContent = newPokemon;
  
  // Update result
  currentResult = {
    pokemon: newPokemon,
    method: currentMethod,
    game: currentGame
  };
}

async function addToList() {
  if (!currentResult) return;
  
  state[selectedPlayer].push({
    ...currentResult,
    id: Date.now()
  });
  
  await saveState();
  renderTables();
  
  document.getElementById('addBtn').disabled = true;
  currentResult = null;
}

function deleteHunt(player, id) {
  console.log('deleteHunt called with player:', player, 'id:', id, 'type:', typeof id);
  console.log('Current state:', state);
  
  if (!confirm('Delete this hunt?')) return;
  
  // Convert id to number if it's a string
  const numId = typeof id === 'string' ? parseInt(id) : id;
  
  console.log('Filtering with numId:', numId);
  state[player] = state[player].filter(h => {
    console.log('Checking hunt id:', h.id, 'against', numId, 'match:', h.id !== numId);
    return h.id !== numId;
  });
  
  console.log('State after filter:', state);
  saveState();
  renderTables();
}

function renderTables() {
  renderTable('dave');
  renderTable('colton');
}

function renderTable(player) {
  const tbody = document.getElementById(player + 'Table');
  const hunts = state[player];
  
  if (hunts.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No hunts yet</td></tr>';
    return;
  }
  
  tbody.innerHTML = hunts.map((hunt, index) => `
    <tr>
      <td>${hunt.game}</td>
      <td>${hunt.method}</td>
      <td>${hunt.pokemon}</td>
      <td>
        <button class="delete-btn" onclick="deleteHuntByIndex('${player}', ${index})">×</button>
      </td>
    </tr>
  `).join('');
}

async function deleteHuntByIndex(player, index) {
  alert('Delete function called for ' + player + ' index ' + index);
  
  if (!confirm('Delete this hunt?')) return;
  
  // Delete from state
  state[player].splice(index, 1);
  
  // Save to server and wait for it to complete
  await saveState();
  
  // Re-render
  renderTables();
}

// Initialize
loadState();
