<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiny Hunting Bingo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #17171e;
  --surface2: #1f1f28;
  --border: #2a2a36;
  --border2: #3a3a4a;
  --text: #e8e8f0;
  --muted: #7a7a90;
  --p1: #4fc3f7;
  --p1bg: rgba(79,195,247,0.08);
  --p1border: rgba(79,195,247,0.3);
  --p2: #ff8a65;
  --p2bg: rgba(255,138,101,0.08);
  --p2border: rgba(255,138,101,0.3);
  --gold: #ffd54f;
  --green: #69f0ae;
  --red: #ff5252;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--gold);
}
.scores {
  display: flex;
  gap: 12px;
  align-items: center;
}
.score-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border-radius: 24px;
  padding: 6px 14px;
  border: 1px solid var(--border);
}
.score-chip.p1 { border-color: var(--p1border); }
.score-chip.p2 { border-color: var(--p2border); }
.score-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.score-val { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; }
.score-chip.p1 .score-val { color: var(--p1); }
.score-chip.p2 .score-val { color: var(--p2); }
.header-actions { display: flex; gap: 8px; }
.btn { 
  padding: 7px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text); transition: all 0.15s;
  font-weight: 500;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-primary { background: var(--gold); color: #0e0e12; border-color: var(--gold); font-weight: 600; }
.btn-primary:hover { background: #ffe082; border-color: #ffe082; color: #0e0e12; }

/* MAIN LAYOUT */
.main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

/* DEX ROLLER */
.dex-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.dex-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}
.dex-section.p1-section { border-top: 2px solid var(--p1border); }
.dex-section.p2-section { border-top: 2px solid var(--p2border); }
.dex-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.dex-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
.dex-section.p1-section .dex-label { color: var(--p1); }
.dex-section.p2-section .dex-label { color: var(--p2); }
.pokeball-btn {
  width: 48px; height: 48px; border-radius: 50%;
  border: 3px solid var(--border2);
  cursor: pointer; position: relative; overflow: hidden;
  background: var(--surface2); flex-shrink: 0;
  transition: transform 0.1s, border-color 0.2s;
}
.pokeball-btn:hover { transform: scale(1.05); }
.dex-section.p1-section .pokeball-btn:hover { border-color: var(--p1); }
.dex-section.p2-section .pokeball-btn:hover { border-color: var(--p2); }
.pb-top { position: absolute; top: 0; left: 0; right: 0; height: 50%; background: #e53935; }
.pb-mid { position: absolute; top: calc(50% - 3px); left: 0; right: 0; height: 6px; background: #111; z-index: 2; }
.pb-ctr { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 14px; height: 14px; background: #fff; border-radius: 50%; border: 3px solid #111; z-index: 3; transition: background 0.2s; }
.pb-bot { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: #eee; }
.pokeball-btn.spinning .pb-top { animation: pball 0.12s linear infinite; }
.pokeball-btn.spinning .pb-ctr { background: var(--gold); }
@keyframes pball { 0%,100%{transform:scaleX(1)}50%{transform:scaleX(-1)} }
.dex-result { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--gold); min-width: 60px; }
.dex-result span { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
.dex-roll-btn { padding: 5px 12px; font-size: 11px; cursor: pointer; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface2); color: var(--text); margin-left: auto; }
.dex-roll-btn:hover { border-color: var(--gold); color: var(--gold); }
.dex-slots-grid { display: flex; flex-direction: column; gap: 5px; }
.slot-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px;
  transition: border-color 0.15s;
}
.slot-row.filled { border-color: rgba(255,213,79,0.35); background: rgba(255,213,79,0.05); }
.slot-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); min-width: 36px; }
.slot-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; flex: 1; }
.slot-row.filled .slot-val { color: var(--gold); }
.slot-row:not(.filled) .slot-val { color: var(--muted); }
.slot-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 1px 5px; border-radius: 3px; opacity: 0; transition: opacity 0.15s, color 0.15s; }
.slot-row.filled .slot-clear { opacity: 1; }
.slot-clear:hover { color: var(--red); }

/* BINGO GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
}
.cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color 0.15s;
  min-height: 140px;
}
.cell:hover { border-color: var(--border2); }
.cell-name { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.4; }
.cell-game { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }
.cell-target { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--gold); }
.catches { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.catch-slot {
  border-radius: 5px; padding: 5px 7px;
  border: 1px solid var(--border);
  background: var(--surface2);
  display: flex; flex-direction: column; gap: 1px;
  cursor: pointer; transition: border-color 0.15s;
  min-height: 42px;
}
.catch-slot:hover { border-color: var(--border2); }
.catch-slot.p1 { border-color: var(--p1border); background: var(--p1bg); }
.catch-slot.p2 { border-color: var(--p2border); background: var(--p2bg); }
.catch-player { font-size: 9px; font-weight: 600; font-family: 'DM Mono', monospace; }
.catch-slot.p1 .catch-player { color: var(--p1); }
.catch-slot.p2 .catch-player { color: var(--p2); }
.catch-slot:not(.p1):not(.p2) .catch-player { color: var(--muted); }
.catch-mon { font-size: 10px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.catch-pts { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
.catch-slot.p1 .catch-pts { color: var(--p1); }
.catch-slot.p2 .catch-pts { color: var(--p2); }
.catch-add { font-size: 9px; color: var(--muted); font-style: italic; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 24px;
  width: 440px; max-width: 95vw;
  max-height: 90vh; overflow-y: auto;
}
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--gold); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; font-family: 'DM Mono', monospace; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 5px; }
.form-input, .form-select {
  width: 100%; padding: 9px 12px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text); font-size: 13px;
  font-family: 'DM Sans', sans-serif; transition: border-color 0.15s; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--gold); }
.form-select option { background: var(--surface2); }
.bst-hint { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
.bst-hint.found { color: var(--green); }
.bst-hint.notfound { color: var(--red); }

.score-preview {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 14px 16px;
  margin: 16px 0; text-align: center;
}
.preview-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--gold); line-height: 1; }
.preview-pts { font-size: 13px; color: var(--muted); margin-top: 2px; }
.preview-breakdown { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 8px; line-height: 1.8; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

/* CATCH LOG */
.log-section { margin-top: 24px; }
.log-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
.log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.log-table th {
  text-align: left; padding: 8px 12px;
  background: var(--surface); border-bottom: 1px solid var(--border2);
  font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
  font-family: 'DM Mono', monospace;
}
.log-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.log-table tr:hover td { background: var(--surface2); }
.tag-p1 { color: var(--p1); font-weight: 600; font-family: 'DM Mono', monospace; }
.tag-p2 { color: var(--p2); font-weight: 600; font-family: 'DM Mono', monospace; }
.pts-val { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--gold); }
.del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
.del-btn:hover { color: var(--red); background: rgba(255,82,82,0.1); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface); border: 1px solid var(--border2);
  border-left: 3px solid var(--green);
  border-radius: var(--radius); padding: 12px 18px;
  font-size: 13px; z-index: 300;
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

.empty-log { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">✦ Shiny Hunting Bingo</div>
  <div class="scores">
    <div class="score-chip p1">
      <span class="score-label">Dave</span>
      <span class="score-val" id="p1total">0</span>
    </div>
    <div class="score-chip p2">
      <span class="score-label">Colton</span>
      <span class="score-val" id="p2total">0</span>
    </div>
  </div>
  <div class="header-actions">
    <span id="syncStatus" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-right:4px">⟳ Connecting...</span>
    <button class="btn" onclick="exportData()">Export JSON</button>
    <button class="btn" onclick="importData()">Import JSON</button>
    <button class="btn" style="color:var(--red);border-color:rgba(255,82,82,0.3)" onclick="resetAll()">Reset</button>
  </div>
</div>

<div class="main">

  <!-- DEX ROLLERS -->
  <div class="dex-row">
    <div class="dex-section p1-section">
      <div class="dex-top">
        <span class="dex-label">Dave Dex Roller</span>
        <div class="pokeball-btn" id="pokeball1" onclick="rollDex(1)">
          <div class="pb-top"></div><div class="pb-mid"></div><div class="pb-ctr"></div><div class="pb-bot"></div>
        </div>
        <div class="dex-result" id="dexResult1">#???<span id="dexSub1">tap to roll</span></div>
        <button class="dex-roll-btn" onclick="rollDex(1)">Roll</button>
      </div>
      <div class="dex-slots-grid" id="dexSlots1"></div>
    </div>
    <div class="dex-section p2-section">
      <div class="dex-top">
        <span class="dex-label">Colton Dex Roller</span>
        <div class="pokeball-btn" id="pokeball2" onclick="rollDex(2)">
          <div class="pb-top"></div><div class="pb-mid"></div><div class="pb-ctr"></div><div class="pb-bot"></div>
        </div>
        <div class="dex-result" id="dexResult2">#???<span id="dexSub2">tap to roll</span></div>
        <button class="dex-roll-btn" onclick="rollDex(2)">Roll</button>
      </div>
      <div class="dex-slots-grid" id="dexSlots2"></div>
    </div>
  </div>

  <!-- BINGO GRID -->
  <div class="grid" id="grid"></div>

  <!-- CATCH LOG -->
  <div class="log-section">
    <div class="log-title">Catch Log</div>
    <table class="log-table">
      <thead>
        <tr>
          <th>Player</th><th>Square</th><th>Pokémon</th><th>BST</th>
          <th>Game</th><th>Odds</th><th>Score</th><th></th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
    <div class="empty-log" id="emptyLog">No catches logged yet.</div>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Log Catch</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="form-group">
      <label class="form-label">Player</label>
      <select class="form-select" id="fPlayer">
        <option value="1">Dave</option>
        <option value="2">Colton</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Pokémon Name</label>
      <input class="form-input" type="text" id="fMon" placeholder="e.g. gyarados" autocomplete="off" oninput="onMonInput()">
      <div class="bst-hint" id="bstHint">Type a Pokémon name to look up BST</div>
    </div>

    <!-- GAME -->
    <div class="form-group">
      <label class="form-label">Game</label>
      <select class="form-select" id="fGame" onchange="onGameChange()">
        <option value="frlg">FireRed / LeafGreen</option>
        <option value="lgpe">Let's Go Pikachu / Eevee</option>
        <option value="bdsp">Brilliant Diamond / Shining Pearl</option>
        <option value="swsh">Sword / Shield</option>
        <option value="la">Legends: Arceus</option>
        <option value="lza">Legends: Z-A</option>
        <option value="sv">Scarlet / Violet</option>
      </select>
    </div>

    <!-- METHOD — populated dynamically per game -->
    <div class="form-group">
      <label class="form-label">Method</label>
      <select class="form-select" id="fMethod" onchange="onMethodChange()"></select>
    </div>

    <!-- DYNAMIC BOOSTERS — shown/hidden per game+method -->
    <div id="boosterSection"></div>

    <!-- MARK -->
    <div class="form-group">
      <label class="form-label">Mark <span style="font-size:10px;color:var(--muted)">(Sword/Shield & S/V only)</span></label>
      <select class="form-select" id="fMark" onchange="calcPreview()">
        <option value="1.0">No mark</option>
        <option value="1.5">Common mark (~1/100)</option>
        <option value="2.0">Uncommon mark (~1/1,000)</option>
        <option value="3.0">Rare mark (~1/10,000)</option>
        <option value="5.0">Ultra-rare / Destiny Mark (~1/100,000)</option>
      </select>
    </div>

    <div class="score-preview">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:6px" id="oddsDisplay">Odds: —</div>
      <div class="preview-num" id="previewNum">—</div>
      <div class="preview-pts">points</div>
      <div class="preview-breakdown" id="previewBreakdown"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCatch()">Save Catch</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================

function setSyncStatus(status, msg) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  var colors = { ok:'var(--green)', err:'var(--red)', loading:'var(--gold)', idle:'var(--muted)' };
  el.textContent = msg;
  el.style.color = colors[status] || colors.idle;
}

async function createBin(state) {
  setSyncStatus('loading', '⟳ Creating shared board...');
  try {
    var res = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': MASTER_KEY,
        'X-Access-Key': ACCESS_KEY,
        'X-Bin-Name': 'shinyBingo'
      },
      body: JSON.stringify(state)
    });
    var data = await res.json();
    if (!res.ok) {
      console.error('JSONBin create error:', res.status, data);
      setSyncStatus('err', '✗ ' + (data.message || 'Create failed (' + res.status + ')'));
      return null;
    }
    binId = data.metadata.id;
    localStorage.setItem(BIN_ID_KEY, binId);
    setSyncStatus('ok', '✓ Board created & synced');
    return binId;
  } catch(e) {
    console.error('JSONBin create exception:', e);
    setSyncStatus('err', '✗ Network error creating board');
    return null;
  }
}

async function pushState(state) {
  if (!binId) { await createBin(state); return; }
  setSyncStatus('loading', '⟳ Saving...');
  try {
    await fetch('https://api.jsonbin.io/v3/b/' + binId, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': MASTER_KEY,
        'X-Access-Key': ACCESS_KEY
      },
      body: JSON.stringify(state)
    });
    setSyncStatus('ok', '✓ Saved ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSyncStatus('err', '✗ Save failed — changes stored locally');
    localStorage.setItem('shinyBingo', JSON.stringify(state));
  }
}

async function pullState() {

      headers: { 'X-Master-Key': MASTER_KEY, 'X-Access-Key': ACCESS_KEY }

    var data = await res.json();
    return data.record || null;
  } catch(e) {

  if (binId) {
    state = await pullState();
    if (!state) {
      // Fallback to localStorage
      state = JSON.parse(localStorage.getItem('shinyBingo') || 'null');
    }
  } else {
    // First load — check localStorage for migrating existing data
    state = JSON.parse(localStorage.getItem('shinyBingo') || 'null');
  }
  if (!state) state = defaultState();
  // Ensure all keys exist
  if (!state.catches)   state.catches = {};
  if (!state.dexSlots1) state.dexSlots1 = [null,null,null,null,null,null];
  if (!state.dexSlots2) state.dexSlots2 = [null,null,null,null,null,null];
  if (!state.laArea)    state.laArea = null;
  if (!state.zaZones)   state.zaZones = [null,null,null];
  // Cache locally
  localStorage.setItem('shinyBingo', JSON.stringify(state));
  if (!binId) await createBin(state);
  else setSyncStatus('ok', '✓ Loaded ' + new Date().toLocaleTimeString());
  renderWithState(state);
  startAutoRefresh();
}

function startAutoRefresh() {
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(async function() {
    if (document.hidden) return; // don't refresh if tab not visible
    var state = await pullState();
    if (!state) return;
    localStorage.setItem('shinyBingo', JSON.stringify(state));
    renderWithState(state);
    setSyncStatus('ok', '✓ Refreshed ' + new Date().toLocaleTimeString());
  }, 30000); // every 30 seconds
}

function loadState() {
  try { return JSON.parse(localStorage.getItem('shinyBingo') || '{}'); } catch(e) { return {}; }
}
function saveState(state) {
  // Write locally immediately so UI is snappy, then push to JSONBin
  localStorage.setItem('shinyBingo', JSON.stringify(state));
  pushState(state);
}
function getState() {
  var s = loadState();
  if (!s.catches)   s.catches = {};
  if (!s.dexSlots1) s.dexSlots1 = [null,null,null,null,null,null];
  if (!s.dexSlots2) s.dexSlots2 = [null,null,null,null,null,null];
  if (!s.laArea)    s.laArea = null;
  if (!s.zaZones)   s.zaZones = [null,null,null];
  return s;
}

      if (method === 'masuda') return b.charm ? 512.44 : 683.08;
      if (method === 'wild')   return b.charm ? 1365.67 : 4096;
      if (method === 'sos') {
        var chain = parseInt(b.soschain || 0);
        if (chain >= 70) return b.charm ? 683 : 1024;
        if (chain >= 30) return b.charm ? 1024 : 1365;
        if (chain >= 20) return b.charm ? 1365 : 2048;
        if (chain >= 10) return b.charm ? 2048 : 3277;
        return b.charm ? 1365.67 : 4096;
      }
      if (method === 'wormhole') {
        // Odds are percentage-based: d = floor(LY/500) - 1, capped at 9
        var ly = parseInt(b.wormhole_ly || 0);
        var rings = parseInt(b.wormhole_rings || 0);
        var d = Math.min(9, Math.max(0, Math.floor(ly / 500) - 1));
        var pct;
        if (rings === 0) pct = 1;
        else if (rings === 1) pct = Math.min(10, 1 + d);
        else if (rings === 2) pct = Math.min(19, 1 + 2*d);
        else pct = Math.min(36, 4*d); // 3-ring
        if (pct <= 0) pct = 1;
        return Math.round(100 / pct);
      }
      return b.charm ? 1365.67 : 4096;
    }
  }
};

function oddsFromRolls(rolls) {
  if (rolls <= 1) return 4096;
  var p = 1 - Math.pow(4095/4096, rolls);
  return Math.round(1 / p);
}

function bstMult(bst) {
  if (bst >= 600) return 2.5;
  if (bst >= 500) return 2.0;
  if (bst >= 400) return 1.5;
  return 1.0;
}

function oddsToMethodScore(odds) {
  return Math.round(Math.log2(8192 / odds) * 100);
}

function calcScore(odds, bst, mark) {
  return Math.round(oddsToMethodScore(odds) * bstMult(bst) * parseFloat(mark));
}

function lookupBST(name) {
  return BST[name.toLowerCase().trim()] || null;
}

function buildBoosters() {
  var game = document.getElementById('fGame').value;
  var method = document.getElementById('fMethod').value;
  var cfg = GAMES[game];
  var sec = document.getElementById('boosterSection');
  if (!cfg.boosters || cfg.boosters.length === 0) { sec.innerHTML = ''; return; }
  var html = '';
  cfg.boosters.forEach(function(b) {
    if (b.show && b.show.indexOf(method) === -1) return;
    html += '<div class="form-group">';
    html += '<label class="form-label">' + b.label;
    if (b.note) html += ' <span style="font-size:9px;color:var(--muted);font-weight:400">' + b.note + '</span>';
    html += '</label>';
    if (b.type === 'check') {
      html += '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">' +
        '<input type="checkbox" id="b_' + b.id + '" onchange="calcPreview()" style="width:16px;height:16px;cursor:pointer"> Yes</label>';
    } else {
      html += '<select class="form-select" id="b_' + b.id + '" onchange="calcPreview()">';
      b.options.forEach(function(o) { html += '<option value="' + o.value + '">' + o.label + '</option>'; });
      html += '</select>';
    }
    html += '</div>';
  });
  sec.innerHTML = html;

    } else if (sqNameLower.includes('dexnav')) {
      for (var o = 0; o < methodSel.options.length; o++) {
        if (methodSel.options[o].value === 'dexnav') { methodSel.value = 'dexnav'; break; }
      }
    } else if (sqNameLower.includes('friend safari')) {
      for (var o = 0; o < methodSel.options.length; o++) {
        if (methodSel.options[o].value === 'safari') { methodSel.value = 'safari'; break; }
      }
    } else if (sqNameLower.includes('sos')) {
      for (var o = 0; o < methodSel.options.length; o++) {
        if (methodSel.options[o].value === 'sos') { methodSel.value = 'sos'; break; }
      }
    } else if (sqNameLower.includes('wormhole')) {
      for (var o = 0; o < methodSel.options.length; o++) {
        if (methodSel.options[o].value === 'wormhole') { methodSel.value = 'wormhole'; break; }
      }
    }
  }
  buildBoosters();
  if (existing) updateBSTHint(existing.mon);
  calcPreview();
  document.getElementById('modal').classList.add('open');
  setTimeout(function() { document.getElementById('fMon').focus(); }, 100);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function onMonInput() { updateBSTHint(document.getElementById('fMon').value); calcPreview(); }

function updateBSTHint(name) {
  var hint = document.getElementById('bstHint');
  if (!name) { hint.textContent = 'Type a Pokémon name to look up BST'; hint.className = 'bst-hint'; return; }
  var bst = lookupBST(name);
  if (bst) {
    hint.textContent = 'BST: ' + bst + ' → ×' + bstMult(bst) + ' multiplier';
    hint.className = 'bst-hint found';
  } else {
    hint.textContent = 'Not found — try lowercase with hyphens (e.g. mr-mime, nidoran-f)';
    hint.className = 'bst-hint notfound';
  }
}

function calcPreview() {
  var mon = document.getElementById('fMon').value;
  var gameEl = document.getElementById('fGame');
  var methodEl = document.getElementById('fMethod');
  if (!gameEl || !methodEl) return;
  var game = gameEl.value;
  var method = methodEl.value;
  var mark = parseFloat(document.getElementById('fMark').value);
  var boosters = getBoosters();
  var bst = lookupBST(mon);
  var odds = GAMES[game].getOdds(method, boosters);
  document.getElementById('oddsDisplay').textContent = 'Odds: 1/' + Math.round(odds);
  if (!bst) {
    document.getElementById('previewNum').textContent = '—';
    document.getElementById('previewBreakdown').textContent = '';
    return;
  }
  var ms = oddsToMethodScore(odds);
  var score = calcScore(odds, bst, mark);
  document.getElementById('previewNum').textContent = score;
  document.getElementById('previewBreakdown').textContent =
    'Method score: ' + ms + '  (1/' + Math.round(odds) + ')\nBST ' + bst + ' → ×' + bstMult(bst) + '\nMark → ×' + mark;
}

function saveCatch() {
  var mon = document.getElementById('fMon').value.trim();
  var player = parseInt(document.getElementById('fPlayer').value);
  var game = document.getElementById('fGame').value;
  var method = document.getElementById('fMethod').value;
  var markMult = document.getElementById('fMark').value;
  var markLabel = document.getElementById('fMark').options[document.getElementById('fMark').selectedIndex].text;
  var boosters = getBoosters();

  if (!mon) { alert('Enter a Pokémon name'); return; }
  var bst = lookupBST(mon);
  if (!bst) { alert('Pokémon not found. Check spelling — use lowercase with hyphens (e.g. mr-mime)'); return; }

  var odds = GAMES[game].getOdds(method, boosters);
  var score = calcScore(odds, bst, markMult);
  var methodLabel = GAMES[game].methods.find(function(m) { return m.id === method; }).label;
  var key = currentSquare + '-' + player;
  var state = getState();
  state.catches[key] = {
    mon: mon, player: player, bst: bst,
    game: game, gameLabel: GAMES[game].label,
    method: method, methodLabel: methodLabel,
    boosters: boosters,
    mark: markLabel, markMult: markMult,
    odds: Math.round(odds), score: score, ts: Date.now()
  };
  saveState(state);
  closeModal();
  render();
  showToast(mon + ' (1/' + Math.round(odds) + ') → ' + score + ' pts for ' + (player==1?'Dave':'Colton'));
}

// ============================================================
// LA AREA & ZA ZONE ROLLERS
// ============================================================
var LA_AREAS = [
  "Obsidian Fieldlands",
  "Crimson Mirelands",
  "Cobalt Coastlands",
  "Coronet Highlands",
  "Alabaster Icelands"
];

var ZA_ZONES = [
  "Wild Zone 1","Wild Zone 2","Wild Zone 3","Wild Zone 4","Wild Zone 5",
  "Wild Zone 6","Wild Zone 7","Wild Zone 8","Wild Zone 9","Wild Zone 10",
  "Wild Zone 11","Wild Zone 12","Wild Zone 13","Wild Zone 14","Wild Zone 15",
  "Wild Zone 16","Wild Zone 17","Wild Zone 18","Wild Zone 19","Wild Zone 20"
];

function rollLAArea() {
  var state = getState();
  var rolled = LA_AREAS[Math.floor(Math.random() * LA_AREAS.length)];
  state.laArea = rolled;
  saveState(state);
  render();
  showToast('Legends Arceus area: ' + rolled);
}

function clearLAArea() {
  var state = getState();
  state.laArea = null;
  saveState(state);
  render();
}

function rollZAZone(slotIdx) {
  var state = getState();
  // Pick a zone not already assigned
  var taken = state.zaZones.filter(function(z){ return z !== null; });
  var available = ZA_ZONES.filter(function(z){ return taken.indexOf(z) === -1; });
  if (available.length === 0) { showToast('All zones assigned!'); return; }
  var rolled = available[Math.floor(Math.random() * available.length)];
  state.zaZones[slotIdx] = rolled;
  saveState(state);
  render();
  showToast('Z-A Zone #' + (slotIdx+1) + ': ' + rolled);
}

function clearZAZone(slotIdx) {
  var state = getState();
  state.zaZones[slotIdx] = null;
  saveState(state);
  render();
}


function renderWithState(state) {
  renderScores(state);
  renderDexSlots(state);
  renderGrid(state);
  renderLog(state);
}

function render() {
  renderWithState(getState());
}

function renderScores(state) {
  var p1 = 0, p2 = 0;
  Object.values(state.catches).forEach(function(c) {
    if (c.player == 1) p1 += c.score;
    if (c.player == 2) p2 += c.score;
  });
  document.getElementById('p1total').textContent = p1;
  document.getElementById('p2total').textContent = p2;
}

function renderDexSlots(state) {
  [1, 2].forEach(function(p) {
    var slots = state['dexSlots' + p];
    var html = slots.map(function(v, i) {
      return '<div class="slot-row' + (v ? ' filled' : '') + '">' +
        '<span class="slot-num">Slot ' + (i+1) + '</span>' +
        '<span class="slot-val">' + (v ? '#' + v : '—') + '</span>' +
        (v ? '<button class="slot-clear" onclick="clearSlot(' + p + ',' + i + ')" title="Clear slot">✕</button>' : '') +
      '</div>';
    }).join('');
    document.getElementById('dexSlots' + p).innerHTML = html;
  });
}

function renderGrid(state) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  SQUARES.forEach(function(sq, i) {
    var p1key = i + '-1', p2key = i + '-2';
    var c1 = state.catches[p1key], c2 = state.catches[p2key];

    // Dex spin target
    var p1slots = state.dexSlots1 || [null,null,null,null,null,null];
    var p2slots = state.dexSlots2 || [null,null,null,null,null,null];
    var target = sq.spin && sq.slot !== undefined ?
      'Dave: ' + (p1slots[sq.slot] ? '#'+p1slots[sq.slot] : '—') + ' · Colton: ' + (p2slots[sq.slot] ? '#'+p2slots[sq.slot] : '—') : '';

    // LA area roller
    var areaHtml = '';
    if (sq.laArea) {
      var area = state.laArea;
      areaHtml = '<div style="margin:4px 0;padding:4px 6px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);font-size:10px;">' +
        '<span style="color:var(--muted);font-size:9px;display:block;margin-bottom:2px">Assigned Area</span>' +
        '<span style="color:var(--gold);font-weight:500">' + (area || '—') + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:4px;margin-bottom:4px">' +
        '<button onclick="rollLAArea()" style="flex:1;font-size:9px;padding:3px 0;cursor:pointer;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);color:var(--text)">🎲 Roll Area</button>' +
        (area ? '<button onclick="clearLAArea()" style="font-size:9px;padding:3px 6px;cursor:pointer;border-radius:4px;background:none;border:1px solid var(--border);color:var(--muted)">✕</button>' : '') +
        '</div>';
    }

    // ZA zone roller
    var zoneHtml = '';
    if (sq.zaZone) {
      var zone = state.zaZones[sq.zaSlot];
      zoneHtml = '<div style="margin:4px 0;padding:4px 6px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);font-size:10px;">' +
        '<span style="color:var(--muted);font-size:9px;display:block;margin-bottom:2px">Assigned Zone</span>' +
        '<span style="color:var(--gold);font-weight:500">' + (zone || '—') + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:4px;margin-bottom:4px">' +
        '<button onclick="rollZAZone(' + sq.zaSlot + ')" style="flex:1;font-size:9px;padding:3px 0;cursor:pointer;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);color:var(--text)">🎲 Roll Zone</button>' +
        (zone ? '<button onclick="clearZAZone(' + sq.zaSlot + ')" style="font-size:9px;padding:3px 6px;cursor:pointer;border-radius:4px;background:none;border:1px solid var(--border);color:var(--muted)">✕</button>' : '') +
        '</div>';
    }

    var cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML =
      '<div class="cell-name">' + sq.name + '</div>' +
      '<div class="cell-game">' + sq.game + '</div>' +
      (target ? '<div class="cell-target">' + target + '</div>' : '') +
      areaHtml + zoneHtml +
      '<div class="catches">' +
        '<div class="catch-slot' + (c1 ? ' p1' : '') + '" onclick="openModal(' + i + ',1)">' +
          '<span class="catch-player">Dave</span>' +
          (c1 ? '<span class="catch-mon">' + c1.mon + '</span><span class="catch-pts">' + c1.score + ' pts</span>' : '<span class="catch-add">+ log catch</span>') +
        '</div>' +
        '<div class="catch-slot' + (c2 ? ' p2' : '') + '" onclick="openModal(' + i + ',2)">' +
          '<span class="catch-player">Colton</span>' +
          (c2 ? '<span class="catch-mon">' + c2.mon + '</span><span class="catch-pts">' + c2.score + ' pts</span>' : '<span class="catch-add">+ log catch</span>') +
        '</div>' +
      '</div>';
    grid.appendChild(cell);
  });
}

function renderLog(state) {
  var catches = Object.entries(state.catches);
  var tbody = document.getElementById('logBody');
  var empty = document.getElementById('emptyLog');
  if (catches.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  catches.sort(function(a, b) { return (b[1].ts||0) - (a[1].ts||0); });
  tbody.innerHTML = catches.map(function(entry) {
    var key = entry[0], c = entry[1];
    var parts = key.split('-');
    var sqIdx = parseInt(parts[0]);
    var sq = SQUARES[sqIdx] || {};
    return '<tr>' +
      '<td class="tag-p' + c.player + '">' + (c.player==1?'Dave':'Colton') + '</td>' +
      '<td>' + (sq.name || '—') + '</td>' +
      '<td>' + c.mon + '</td>' +
      '<td style="font-family:\'DM Mono\',monospace">' + (c.bst||'—') + '</td>' +
      '<td style="color:var(--muted);font-size:11px">' + (c.gameLabel||c.game||'—') + '</td>' +
      '<td style="font-family:\'DM Mono\',monospace;color:var(--muted);font-size:11px">' + (c.odds ? '1/'+c.odds : '—') + '</td>' +
      '<td class="pts-val">' + c.score + '</td>' +
      '<td><button class="del-btn" onclick="deleteCatch(\'' + key + '\')">✕</button></td>' +
    '</tr>';
  }).join('');
}



function deleteCatch(key) {
  if (!confirm('Delete this catch?')) return;
  var state = getState();
  delete state.catches[key];
  saveState(state);
  render();
}

// ============================================================
// DEX ROLLER
// ============================================================
function rollDex(player) {
  var state = getState();
  var key = 'dexSlots' + player;
  var slots = state[key];
  var emptySlot = slots.findIndex(function(s) { return s === null; });
  if (emptySlot === -1) { showToast((player==1?'Dave':'Colton') + ' slots full! Clear a slot to re-roll.'); return; }

  var ball = document.getElementById('pokeball' + player);
  var resultEl = document.getElementById('dexResult' + player);
  var subEl = document.getElementById('dexSub' + player);
  ball.classList.add('spinning');
  var t = 0;
  var iv = setInterval(function() {
    var n = Math.floor(Math.random() * 1025) + 1;
    resultEl.childNodes[0].textContent = '#' + n;
    t++;
    if (t > 14) {
      clearInterval(iv);
      ball.classList.remove('spinning');
      var final = Math.floor(Math.random() * 1025) + 1;
      resultEl.childNodes[0].textContent = '#' + final;
      subEl.textContent = 'Slot ' + (emptySlot + 1) + ' assigned';
      state[key][emptySlot] = final;
      saveState(state);
      render();
      showToast((player==1?'Dave':'Colton') + ' rolled #' + final + ' → Slot ' + (emptySlot + 1));
    }
  }, 60);
}

function clearSlot(player, slotIdx) {
  var state = getState();
  var key = 'dexSlots' + player;
  state[key][slotIdx] = null;
  saveState(state);
  render();
  showToast((player==1?'Dave':'Colton') + ' Slot ' + (slotIdx + 1) + ' cleared');
}

// ============================================================
// EXPORT / IMPORT / RESET
// ============================================================
function exportData() {
  var state = getState();
  var blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shiny-bingo-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        localStorage.setItem('shinyBingo', JSON.stringify(data));
        pushState(data);
        render();
        showToast('Data imported successfully');
      } catch(err) { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAll() {
  if (!confirm('Reset all data? This cannot be undone.')) return;
  var state = defaultState();
  localStorage.setItem('shinyBingo', JSON.stringify(state));
  pushState(state);
  ['dexResult1','dexResult2'].forEach(function(id) {
    document.getElementById(id).childNodes[0].textContent = '#???';
  });
  document.getElementById('dexSub1').textContent = 'tap to roll';
  document.getElementById('dexSub2').textContent = 'tap to roll';
  render();
  showToast('Board reset');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

// ============================================================
// CLOSE MODAL ON OVERLAY CLICK
// ============================================================
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// INIT
// ============================================================
buildMethodSelect();
buildBoosters();
loadAndRender();
</script>
